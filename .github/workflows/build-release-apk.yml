name: Build Flutter Release APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Create Android platform
        run: flutter create --platforms=android --org com.edaretelshoghl .

      - name: Install packages
        run: flutter pub get

      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Patch Android release signing and app name
        run: python3 tools/patch_android_release.py

      - name: Force compileSdk 36 final
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          paths = [
              Path("android/app/build.gradle"),
              Path("android/app/build.gradle.kts"),
          ]

          for path in paths:
              if not path.exists():
                  continue

              text = path.read_text(encoding="utf-8")

              replacements = {
                  "compileSdk = flutter.compileSdkVersion": "compileSdk = 36",
                  "compileSdk flutter.compileSdkVersion": "compileSdk 36",
                  "compileSdkVersion flutter.compileSdkVersion": "compileSdkVersion 36",
              }

              for old, new in replacements.items():
                  text = text.replace(old, new)

              text = re.sub(r"compileSdk\s*=\s*\d+", "compileSdk = 36", text)
              text = re.sub(r"compileSdk\s+\d+", "compileSdk 36", text)
              text = re.sub(r"compileSdkVersion\s+\d+", "compileSdkVersion 36", text)

              path.write_text(text, encoding="utf-8")
              print(f"Updated {path}")
              print("---- compileSdk lines ----")
              for line in text.splitlines():
                  if "compileSdk" in line:
                      print(line)
          PY

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: EdaretElShoghl-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
